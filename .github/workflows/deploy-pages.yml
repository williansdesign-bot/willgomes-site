# Deploy automatico Cloudflare Pages via wrangler
# Roda em push pra main, faz deploy quando webhook nativo CF nao esta ativo
# Pra desativar: deletar este arquivo OU usar workflow_dispatch only

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=willgomes-site --branch=main --commit-dirty=true
